<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dutch-Trip</title>
  
  <!-- Pretendard Font -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <div class="desktop-sidebar">
    <div style="padding: 0 20px; margin-bottom: 32px; font-size: 18px; font-weight: 700; color: var(--brand-primary); display: flex; align-items: center; gap: 8px;">
      🔵 Dutch-Trip
    </div>
    
    <div style="font-size: 11px; color: var(--neutral-400); padding: 0 20px; margin-bottom: 8px; font-weight: 600;">메인</div>
    <div class="sidebar-item" data-route="login">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      홈
    </div>
    <div class="sidebar-item" data-route="trips">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
      </svg>
      여행 목록
    </div>

    <div style="font-size: 11px; color: var(--neutral-400); padding: 0 20px; margin-top: 16px; margin-bottom: 8px; font-weight: 600;">핵심 기능</div>
    <div class="sidebar-item active" id="desk-nav-expense" data-route="expense">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 8v8M8 12h8"/>
      </svg>
      지출 추가
    </div>
    <div class="sidebar-item" id="desk-nav-settlement" data-route="settlement">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 6v12M9 9.5c0-1 .9-1.5 3-1.5s3 .5 3 1.75-1.2 1.75-3 2.25-3 .75-3 2.25c0 1 .9 1.5 3 1.5s3-.5 3-1.5"/>
      </svg>
      정산 현황
      <span class="sidebar-badge" id="desk-badge-count">2</span>
    </div>

    <div style="font-size: 11px; color: var(--neutral-400); padding: 0 20px; margin-top: 16px; margin-bottom: 8px; font-weight: 600;">관리</div>
    <div class="sidebar-item disabled">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="7" r="4"/>
        <path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/>
        <path d="M16 3.13a4 4 0 010 7.75M21 21v-2a4 4 0 00-3-3.87"/>
      </svg>
      멤버 관리
    </div>
    <div class="sidebar-item disabled">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      설정
    </div>

    <div style="margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--neutral-200); display: flex; align-items: center; gap: 12px; cursor: pointer;">
      <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--brand-accent-subtle); color: var(--brand-primary); display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;">김</div>
      <div style="flex: 1; min-width: 0;">
        <div style="font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">김민준</div>
        <div style="font-size: 11px; color: var(--neutral-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">제주도 2박3일 · 팀장</div>
      </div>
      <div style="color: var(--neutral-400);">⋮</div>
    </div>
  </div>

  <div class="desktop-main">
    <header class="desktop-topbar">
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="border: 1px solid var(--neutral-200); border-radius: var(--radius-full); padding: 6px 16px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;" onclick="showToast('프로토타입에서는 지원하지 않는 기능입니다')">
          <span style="color: var(--semantic-positive);">●</span> 제주도 2박3일 ▼
        </div>
      </div>
      
      <div style="position: relative;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--neutral-400);">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" placeholder="지출 검색..." style="width: 240px; background: var(--neutral-50); border-radius: var(--radius-full); padding: 8px 16px 8px 36px; border: none; font-size: 14px; outline: none;">
      </div>

      <div style="display: flex; align-items: center; gap: 16px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="color: var(--neutral-400); cursor: not-allowed;">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--brand-accent-subtle); color: var(--brand-primary); display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer;">김</div>
      </div>
    </header>
    
    <div class="desktop-content" id="desktop-content">
      <!-- Desktop content dynamically injected here by JS -->
    </div>
  </div>

  <div id="app-container">
    <main id="screen-container"></main>
    
    <nav class="bottom-tab-bar">
      <div class="tab-item disabled">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
        <span class="tab-label">홈</span>
      </div>
      <div class="tab-item disabled">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="8" width="18" height="13" rx="2"/>
          <path d="M8 8V5a2 2 0 012-2h4a2 2 0 012 2v3"/>
          <path d="M3 13h18"/>
        </svg>
        <span class="tab-label">여행</span>
      </div>
      <div class="tab-item active" data-route="expense">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 8v8M8 12h8"/>
        </svg>
        <span class="tab-label">지출 추가</span>
      </div>
      <div class="tab-item" data-route="settlement">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 6v12M9 9.5c0-1 .9-1.5 3-1.5s3 .5 3 1.75-1.2 1.75-3 2.25-3 .75-3 2.25c0 1 .9 1.5 3 1.5s3-.5 3-1.5"/>
        </svg>
        <span class="tab-label">정산</span>
      </div>
      <div class="tab-item disabled">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 21v-1a6 6 0 0112 0v1"/>
        </svg>
        <span class="tab-label">마이페이지</span>
      </div>
    </nav>
    
    <div id="toast-container"></div>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
